# .github/workflows/ci.yml
# This pipeline runs automatically on every push and pull request.

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v

      - name: Health check test
        run: |
          python -c "
          from app import app
          client = app.test_client()
          resp = client.get('/health')
          assert resp.status_code == 200
          print('Health check passed!')
          "

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8

      - name: Run linter
        run: flake8 app.py --max-line-length=100 --ignore=E501
